<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Duels</title>
    <base href="/duels/dev/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Anton&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/terminal.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Duels.Web.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <pre class="loading-art">Loading...</pre>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred. <a href="" class="reload">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/persistence.js"></script>
    <script>
        // Legacy localStorage save, read only once to migrate into IndexedDB
        // (see IndexedDbSaveStore / persistence.js) — new saves never write
        // to localStorage again.
        window.legacyLoadGame  = () => localStorage.getItem('duels_save');
        window.legacyClearGame = () => localStorage.removeItem('duels_save');
        window.triggerShake = (id, ms) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('shake-active');
            void el.offsetWidth;
            el.classList.add('shake-active');
            setTimeout(() => el.classList.remove('shake-active'), ms || 180);
        };
        // Tick metronome: pendulum toggle every 600ms game tick.
        // CSS transition smooths each toggle over 150ms; one full fill→empty
        // cycle spans two ticks (1200ms), giving a calm, readable beat.
        let _metro = null;
        let _metroP = 0;
        window.startMetronome = () => {
            clearInterval(_metro);
            _metroP = 0;
            _metro = setInterval(() => {
                _metroP = 1 - _metroP;
                const b = document.getElementById('tick-bar');
                if (b) b.style.transform = `scaleX(${_metroP})`;
            }, 600);
        };
        window.stopMetronome = () => {
            clearInterval(_metro);
            _metro = null;
            const b = document.getElementById('tick-bar');
            if (b) b.style.transform = 'scaleX(0)';
        };
    </script>
    <script>
        // Precache the toon renderer's model/animation/equip assets (~8MB,
        // never change between sessions) so repeat visits skip the network
        // entirely instead of re-downloading and re-decoding every time.
        // See service-worker.js for the versioned asset list.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(() => {});
        }
    </script>
    <!-- voxel.js is retired from battle duty: it stays only for item icons,
         the character preview, and the anim editor. toon.js owns window.voxel
         and forwards those non-battle calls to it. -->
    <script src="js/voxel.js"></script>
    <script type="module" src="js/toon.js"></script>
</body>
</html>
