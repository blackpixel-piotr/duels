<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Duels</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/terminal.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Duels.Web.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <pre class="loading-art">Loading...</pre>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred. <a href="" class="reload">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.scrollToBottom = (id) => {
            const el = document.getElementById(id);
            if (el) el.scrollTop = el.scrollHeight;
        };
        window.focusElement = (id) => {
            const el = document.getElementById(id);
            if (el) el.focus();
        };
        window.saveGame  = (json) => localStorage.setItem('duels_save', json);
        window.loadGame  = ()     => localStorage.getItem('duels_save');
        window.clearGame = ()     => localStorage.removeItem('duels_save');
        window.triggerShake = (id, ms) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('shake-active');
            void el.offsetWidth;
            el.classList.add('shake-active');
            setTimeout(() => el.classList.remove('shake-active'), ms || 180);
        };
    </script>
</body>
</html>
