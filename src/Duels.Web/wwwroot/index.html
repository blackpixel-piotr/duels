<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Duels</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/terminal.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Duels.Web.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <pre class="loading-art">Loading...</pre>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred. <a href="" class="reload">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.scrollToBottom = (id) => {
            const el = document.getElementById(id);
            if (el) el.scrollTop = el.scrollHeight;
        };
        window.saveGame  = (json) => localStorage.setItem('duels_save', json);
        window.loadGame  = ()     => localStorage.getItem('duels_save');
        window.clearGame = ()     => localStorage.removeItem('duels_save');
        window.triggerShake = (id, ms) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('shake-active');
            void el.offsetWidth;
            el.classList.add('shake-active');
            setTimeout(() => el.classList.remove('shake-active'), ms || 180);
        };
        // Tick metronome: a quick fill then a steady hold, once per 600ms game
        // tick, snap-resetting with a bright "tick-fire" flash marking the
        // tick boundary — the prayer-flick moment. Only the first third of
        // the cycle actually moves; holding the rest gives a calm, distinct
        // "beat" instead of ceaseless sweeping motion.
        const METRONOME_FILL_MS = 200;
        let _metro = null;
        window.startMetronome = () => {
            clearInterval(_metro);
            const sweep = () => {
                const b = document.getElementById('tick-bar');
                if (!b) return;
                // snap back to 0 with no transition, flash the boundary
                b.style.transition = 'none';
                b.style.transform = 'scaleX(0)';
                b.classList.remove('tick-fire');
                void b.offsetWidth;
                b.classList.add('tick-fire');
                setTimeout(() => b.classList.remove('tick-fire'), 120);
                // quick fill, then hold steady until the next beat
                b.style.transition = `transform ${METRONOME_FILL_MS}ms ease-out`;
                b.style.transform = 'scaleX(1)';
            };
            sweep();
            _metro = setInterval(sweep, 600);
        };
        window.stopMetronome = () => {
            clearInterval(_metro);
            _metro = null;
            const b = document.getElementById('tick-bar');
            if (b) {
                b.style.transition = 'none';
                b.style.transform = 'scaleX(0)';
                b.classList.remove('tick-fire');
            }
        };
        window.spawnHitsplats = (splats) => {
            for (const s of splats) {
                const zone = document.getElementById(s.zoneId);
                if (!zone) continue;
                const existing = zone.querySelectorAll('.hitsplat').length;
                const el = document.createElement('span');
                el.className = 'hitsplat hitsplat-' + s.tier;
                el.textContent = s.tier === 'miss' ? '[-]' : '[' + s.damage + ']';
                el.style.bottom = (2 + existing * 22) + 'px';
                zone.appendChild(el);
                el.addEventListener('animationend', () => el.remove(), { once: true });
            }
        };
    </script>
</body>
</html>
