name: Deploy dev preview

on:
  push:
    branches: [claude/text-duel-game-3t4vkf]
  workflow_dispatch:

# Separate concurrency group so main and dev never race each other.
concurrency:
  group: gh-pages-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish src/Duels.Web/Duels.Web.csproj -c Release -o release --nologo

      - name: Fix base href for /duels/dev/ sub-path
        run: sed -i 's|<base href="/" />|<base href="/duels/dev/" />|' release/wwwroot/index.html

      - name: Add SPA 404 fallback
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Disable Jekyll
        run: touch release/wwwroot/.nojekyll

      - name: Deploy to gh-pages branch (/dev sub-directory)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: release/wwwroot
          destination_dir: dev
          keep_files: true
